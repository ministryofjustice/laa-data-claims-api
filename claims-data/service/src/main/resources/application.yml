spring:
  application:
    name: LAA Data Stewardship Payments - Claims Data Application
  mvc:
    problemdetails:
      enabled: true
# Default connection details for local dev, overridden in other envs
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/laa_data_claims_api_dev
    username: user
    password: dev
  flyway:
    schemas: claims, javers
    create-schemas: true
    enabled: true
    out-of-order: true
    placeholders:
      reporting_username: "reporting_user"
      reporting_password: "reporting_password"
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: claims

# Local connection details for dev, overridden in other envs
aws:
  region: us-east-1
  sqs:
    endpoint: http://localhost:4566  # LocalStack default
    queue-name: claims-api-queue

javers:
  sqlSchema: javers

# used by actuator info endpoint
info:
  app:
    name: LAA Data Stewardship Payments - Claims Data Application
    description: LAA Data Stewardship Payments - Claims Data Application that provides APIs to access Claims related data.
    version: 1.0.0

management:
  # specify actuator endpoints to enable
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

  # show detailed health status
  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: false

resilience4j.ratelimiter:
  instances:
    submissionRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    claimRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    bulkSubmissionRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    matterStartRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    validationRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    assessmentRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s

sentry:
  enabled: ${SENTRY_ENABLED:false}
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:1}
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# ECS structured logging
logging:
  level:
    root: ${ROOT_LOGGING_LEVEL:info}
    org.springframework: ${SPRING_LOGGING_LEVEL:info}
    uk.gov.justice.laa.dstew.payments.claimsdata: ${APP_LOGGING_LEVEL:info}
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:default}
        version: ${spring.application.version:default}
        environment: ${spring.profiles.active:default}
        node_name: ${HOSTNAME:unknown}

laa:
  springboot.starter:
    auth:
      authentication-header: "Authorization"
      authorized-clients: '[
          {
              "name": "test-runner",
              "roles": [
                  "ALL"
              ],
              "token": "f67f968e-b479-4e61-b66e-f57984931e56"
          }
      ]'
      authorized-roles: '[
          {
              "name": "ALL",
              "URIs": [
                  "/**"
              ]
          }
      ]'
      unprotected-uris: [ "/actuator/**", "/swagger-ui.html",
                          "/swagger-ui/**", "/v3/api-docs/**", "/favicon.ico", "/open-api-specification.yml"]
    exports:
      enabled: true
      web:
        enabled: true
        base-path: /exports
      defaults:
        max-rows: 50000
      definitions:
        v1-crime-lower:
          description: CRIME LOWER submission claims export V1
          provider: submissionClaimsCrimeLowerProvider
          package-name: uk.gov.justice.laa.dstew.payments.claimsdata.export.generated.v1
        v1-legal-help:
          description: LEGAL HELP submission claims export V1
          provider: submissionClaimsLegalHelpProvider
          package-name: uk.gov.justice.laa.dstew.payments.claimsdata.export.generated.v1
        v1-mediation:
          description: MEDIATION submission claims export V1
          provider: submissionClaimsMediationProvider
          package-name: uk.gov.justice.laa.dstew.payments.claimsdata.export.generated.v1
        v2-crime-lower:
          description: CRIME LOWER submission claims export V2
          provider: submissionClaimsCrimeLowerV2Provider
          package-name: uk.gov.justice.laa.dstew.payments.claimsdata.export.generated.v2
        v2-legal-help:
          description: LEGAL HELP submission claims export V2
          provider: submissionClaimsLegalHelpV2Provider
          package-name: uk.gov.justice.laa.dstew.payments.claimsdata.export.generated.v2
        v2-mediation:
          description: MEDIATION submission claims export V2
          provider: submissionClaimsMediationV2Provider
          package-name: uk.gov.justice.laa.dstew.payments.claimsdata.export.generated.v2