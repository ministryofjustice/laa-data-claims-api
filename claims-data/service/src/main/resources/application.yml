spring:
  application:
    name: LAA Data Stewardship Payments - Claims Data Application
  mvc:
    problemdetails:
      enabled: true
# Default connection details for local dev, overridden in other envs
  datasource:
    driver-class-name: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/laa_data_claims_api_dev
    username: user
    password: dev
  flyway:
    schemas: claims, javers
    create-schemas: true
    enabled: true
    out-of-order: true
    placeholders:
      reporting_username: "reporting_user"
      reporting_password: "reporting_password"
      data_factory_username: ${DATA_FACTORY_USERNAME:data_factory_user}
      data_factory_password: ${DATA_FACTORY_PASSWORD:data_factory_password}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  jackson:
    deserialization:
      fail-on-unknown-properties: true

  jpa:
    show-sql: false
    generate-ddl: false
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        default_schema: claims

# Local connection details for dev, overridden in other envs
aws:
  region: us-east-1
  sqs:
    endpoint: http://localhost:4566  # LocalStack default
    queue-name: claims-api-queue
  sns:
    endpoint: http://localhost:4566
    topic-arn: arn:aws:sns:us-east-1:000000000000:claims-events

javers:
  sqlSchema: javers

# used by actuator info endpoint
info:
  app:
    name: LAA Data Stewardship Payments - Claims Data Application
    description: LAA Data Stewardship Payments - Claims Data Application that provides APIs to access Claims related data.
    version: 1.0.0

management:
  # specify actuator endpoints to enable
  server:
    port: 8081
  endpoints:
    web:
      exposure:
        include: health, info, prometheus

  # show detailed health status
  endpoint:
    health:
      show-details: always

  info:
    env:
      enabled: false

resilience4j.ratelimiter:
  instances:
    submissionRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    claimRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    bulkSubmissionRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    matterStartRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    validationRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    assessmentRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s
    referenceRateLimiter:
      limitForPeriod: 10
      limitRefreshPeriod: 1s

sentry:
  enabled: ${SENTRY_ENABLED:false}
  dsn: ${SENTRY_DSN:}
  environment: ${SENTRY_ENVIRONMENT:local}
  traces-sample-rate: ${SENTRY_TRACES_SAMPLE_RATE:1}
  send-default-pii: false
  logging:
    minimum-event-level: error
    minimum-breadcrumb-level: info

# ECS structured logging
logging:
  level:
    root: ${ROOT_LOGGING_LEVEL:info}
    org.springframework: ${SPRING_LOGGING_LEVEL:info}
    uk.gov.justice.laa.dstew.payments.claimsdata: ${APP_LOGGING_LEVEL:info}
  structured:
    format:
      console: ecs
    ecs:
      service:
        name: ${spring.application.name:default}
        version: ${spring.application.version:default}
        environment: ${spring.profiles.active:default}
        node_name: ${HOSTNAME:unknown}

laa:
  # Claims API application settings (typed via ClaimsApiProperties). Keep all Claims API config
  # under this namespace, grouped by feature, so paths stay consistent and discoverable.
  claims:
    api:
      amendments:
        # Feature toggle for the amendments capability, supplied via the CLAIMS_API_AMENDMENTS_ENABLED
        # env var. Off by default: enabled only when explicitly "true" (any other/invalid/absent
        # value is off).
        enabled: ${CLAIMS_API_AMENDMENTS_ENABLED:false}
        cache:
          # TTL for the governed amendment reference data cache; lazy reload after expiry.
          refresh: 30m
  springboot.starter:
    auth:
      authentication-header: "Authorization"
      authorized-clients: '[
          {
              "name": "test-runner",
              "roles": [
                  "ALL"
              ],
              "token": "f67f968e-b479-4e61-b66e-f57984931e56"
          }
      ]'
      authorized-roles: '[
          {
              "name": "ALL",
              "URIs": [
                  "/**"
              ]
          }
      ]'
      unprotected-uris: [ "/actuator/**", "/swagger-ui.html",
                          "/swagger-ui/**", "/v3/api-docs/**", "/favicon.ico", "/open-api-specification.yml"]
    exports:
      enabled: true
      web:
        enabled: true
        base-path: /exports
      defaults:
        max-rows: 50000
  dstew:
    payments:
      validator:
        provider-details-api:
          url: ${PROVIDER_DETAILS_API_URL}
          accessToken: ${PROVIDER_DETAILS_API_ACCESS_TOKEN}
          authHeader: "X-Authorization"
        fee-scheme-platform-api:
          url: ${FEE_SCHEME_PLATFORM_API_URL}
          accessToken: ${FEE_SCHEME_PLATFORM_API_ACCESS_TOKEN}
        submission:
          minimum-period: ${SUBMISSION_VALIDATION_MINIMUM_PERIOD:APR-2025}

resilience4j.retry:
  instances:
    pdaRetry:
      maxAttempts: 1
