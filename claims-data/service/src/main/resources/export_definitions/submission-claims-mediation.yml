  - key: matterType
    header: Matter Type (1:2)
  - key: feeCode
    header: Fee Code
  - key: caseReferenceNumber
    header: Case Reference Number
  - key: caseStartDate
    header: Case Start Date
  - key: caseId
    header: Claim ID
  - key: uniqueCaseId
    header: Unique Case ID
  - key: claimStatus
    header: Claim Status
  - key: caseConcludedDate
