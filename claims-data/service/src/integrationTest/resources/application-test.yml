spring:
  flyway:
    locations: classpath:db/migration,classpath:db/migration-main

# Enable the amendments capability for integration tests so the full validation chain runs
# (the feature-flag step is first in STEP_ORDER and fails fast when disabled). The feature-disabled
# behaviour is covered separately by AmendmentFeatureFlagValidationStep's unit test.
laa:
  claims:
    api:
      amendments:
        enabled: true

