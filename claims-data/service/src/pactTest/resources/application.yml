spring:
  jpa:
    open-in-view: false
  data:
    jpa:
      repositories:
        enabled: false
  flyway:
    enabled: false
  sql:
    init:
      mode: never

laa:
  springboot.starter.auth:
    authentication-header: "Authorization"
    authorized-clients: '[
        {
            "name": "test-runner",
            "roles": [
                "ALL"
            ],
            "token": "00000000-0000-0000-0000-000000000000"
        }
    ]'
    authorized-roles: '[
        {
            "name": "ALL",
            "URIs": [
                "/**"
            ]
        }
    ]'
    unprotected-uris: [ "/actuator/**", "/swagger-ui.html",
                        "/swagger-ui/**", "/v3/api-docs/**", "/favicon.ico", "/open-api-specification.yml"]

  dstew:
    payments:
      validator:
        provider-details-api:
          url: ${PROVIDER_DETAILS_API_URL}
          accessToken: ${PROVIDER_DETAILS_API_ACCESS_TOKEN}
          authHeader: "X-Authorization"
          readTimeoutMs: ${PROVIDER_DETAILS_API_READ_TIMEOUT_MS:1000}
        fee-scheme-platform-api:
          url: ${FEE_SCHEME_PLATFORM_API_URL}
          accessToken: ${FEE_SCHEME_PLATFORM_API_ACCESS_TOKEN}
          readTimeoutMs: ${FEE_SCHEME_PLATFORM_API_READ_TIMEOUT_MS:500}
        submission:
          minimum-period: ${SUBMISSION_VALIDATION_MINIMUM_PERIOD:APR-2025}