name: Deploy main

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      release_type:
        type: choice
        required: true
        default: "patch"
        description: "Release type"
        options: [ "patch", "minor", "major" ]

env:
  JAVA_VERSION: &JAVA_VERSION '25'
  JDK_DISTRIBUTION: &JDK_DISTRIBUTION 'corretto'

jobs:
  release:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
    with:
      build_command: 'assemble'
      junit_results: 'false'
      junit_report: 'false'
      checkstyle_report: 'false'
      jacoco_coverage_report: 'false'
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      release_type: ${{ inputs.release_type != 'auto' && inputs.release_type || '' }}
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      aws_region: ${{ vars.AWS_REGION }}

  pact-test:
    needs: [ release ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
    with:
      pact_test_task: ":claims-data:service:pactTest"
      pacticipant_name: 'laa-data-claims-api'
      is_provider: true
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  bdd-test:
    runs-on: ubuntu-latest
    needs: [ release ]
    timeout-minutes: 20
    permissions:
      contents: read
      packages: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
        with:
          java-version: *JAVA_VERSION
          distribution: *JDK_DISTRIBUTION

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@3f131e8634966bd73d06cc69884922b02e6faf92 # v6.0.0

      - name: Run BDD test suite (local mode)
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: ./gradlew :claims-data:service:bddTest --no-daemon

      - name: Upload BDD reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bdd-reports
          path: |
            claims-data/service/build/reports/tests/bddTest/**
            claims-data/service/build/test-results/bddTest/**
          if-no-files-found: warn
          retention-days: 14

  ecr-publish-image:
    needs: [ release, bdd-test ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      jar_subproject: 'claims-data:service'
      image_version: ${{ format('{0}-{1}', vars.LAA_DATA_CLAIMS_API_IMAGE_PREFIX, needs.release.outputs.published_artifact_version) }}
      image_scan: 'true'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
      ecr_region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
      ecr_role_to_assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}

  deploy-uat:
    runs-on: ubuntu-latest
    needs:
      - ecr-publish-image
      - pact-test
    environment: uat
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Can I deploy UAT?
        id: can_i_deploy_uat
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-can-i-deploy@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: 'main'
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

      - name: Deploy UAT
        id: deploy_uat
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          image-tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}

      - name: Record UAT deployment to pact broker
        id: record_uat_deployment
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-record-deployment@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: 'main'
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  deploy-staging:
    runs-on: ubuntu-latest
    needs:
      - ecr-publish-image
      - pact-test
      - deploy-uat
    environment: staging
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Can I deploy Staging?
        id: can_i_deploy_staging
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-can-i-deploy@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: 'main'
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

      - name: Deploy staging
        id: deploy_staging
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: staging
          image-tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}

      - name: Record staging deployment to pact broker
        id: record_staging_deployment
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-record-deployment@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: 'main'
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  deploy-production:
    runs-on: ubuntu-latest
    needs:
      - ecr-publish-image
      - pact-test
      - deploy-staging
    environment: production
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Can I deploy Production?
        id: can_i_deploy_production
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-can-i-deploy@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: 'main'
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

      - name: Deploy production
        id: deploy_production
        uses: ./.github/actions/deploy
        with:
          ecr-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: production
          image-tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}

      - name: Record production deployment to pact broker
        id: record_production_deployment
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-record-deployment@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: 'main'
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}
