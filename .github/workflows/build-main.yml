name: Build main

on:
  pull_request:
    branches: [ main ]
    types: [ closed ]

jobs:
  build:
    if: ${{ github.event.pull_request.merged == true }}
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@dc4173bfc12f714d7e8cbdd9f524d00ef02e25c4 # v2.0.0
    permissions:
      contents: write
      packages: write
      pull-requests: write
    with:
      integration_test_task: 'integrationTest'
      create_tag: 'true'
      github_bot_username: 'laa-java-service-deployer'
      semgrep_check: 'false'
      java_version: '25'
      java_distribution: 'corretto'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      github_app_id: ${{ vars.LAA_CCMS_CAAB_SERVICE_APP_ID }}
      github_app_private_key: ${{ secrets.LAA_CCMS_CAAB_SERVICE_KEY }}
      github_app_organisation: 'ministryofjustice'
