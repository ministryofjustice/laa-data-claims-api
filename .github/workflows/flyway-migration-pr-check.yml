# This GitHub Action workflow checks for Flyway migration scripts in pull requests and posts a comment if any are found, reminding developers to assess the impact on replication.
name: Flyway Migration Check

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled, unlabeled]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  check-flyway-migrations:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Check out the repository
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      # Step 2: Check for Flyway migration files in the PR
      - name: Check for Flyway migration files
        id: check-flyway
        run: |
          # List changed files in the PR
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.event.pull_request.head.sha }})

          # Look for Flyway migration files (adjust pattern as necessary)
          echo "$CHANGED_FILES" | grep -qE "resources/db/.*/.*\.sql$" && echo "flyway_found=true" >> $GITHUB_ENV || echo "flyway_found=false" >> $GITHUB_ENV


      # Step 3: Create or update PR comment
      - name: Create or update PR comment
        if: env.flyway_found == 'true'
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = "<!-- flyway-migration-check -->";

            const commentBody = `${marker}
            🚨 **This PR appears to contain Flyway migration scripts**

            Please assess their impact on replication:

            1. Ensure that you have mentioned the migration version in the Confluence page [Flyway Migration History](https://dsdmoj.atlassian.net/wiki/spaces/WHCZA/pages/5866160240/Flyway+migration+history)
            2. Check if the migration scripts include any changes to tables that are replicated or need to be replicated
            3. Assess if the changes will impact or break replication — if unsure, discuss with the Data Stewardship Developers (see the page [Data Replication for Reporting Service](https://dsdmoj.atlassian.net/wiki/spaces/WHCZA/pages/5967873259/Data+Replication+for+Reporting+Service) for details)
            4. If replication is impacted, coordinate with the GLAD team to update the reporting DB accordingly (via the Slack channel #laa-bulkclaim-reporting or Slack alias @glad-devs)
            5. Once you have reviewed the migration scripts and are confident that they will not break replication (or have a remedial action plan), add the label 'flyway-migration-reviewed' to this PR to override the check and allow it to be merged.
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.payload.pull_request.number;

            // Get existing comments
            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            // Look for an existing comment with our marker
            const existingComment = comments.data.find(comment =>
              comment.body.includes(marker)
            );

            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existingComment.id,
                body: commentBody,
              });
              console.log("Updated existing Flyway comment.");
            } else {
              // Create new comment
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body: commentBody,
              });
              console.log("Created new Flyway comment.");
            }

      # Step 4: Fail the check if migrations found and override label is not present
      - name: Require label override for migrations
        if: env.flyway_found == 'true'
        env:
          LABELS: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          if echo "$LABELS" | grep -q "flyway-migration-reviewed"; then
            echo "Override label 'flyway-migration-reviewed' is present. Check passes."
          else
            echo "❌ Flyway migrations found. Review them as per the instructions in the PR comment and add the 'flyway-migration-reviewed' label to this PR to override this check."
            exit 1
          fi
