name: Delete UAT deployment for a branch after its PR is merged or closed

on:
  workflow_dispatch:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  semgrep-scan:
    name: semgrep-security-scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Run Semgrep scan
        run: semgrep scan --exclude-rule python.django.security.django-no-csrf-token.django-no-csrf-token --error --config auto

  cleanup-uat:
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Cleanup uat
        id: cleanup_uat
        uses: ./.github/actions/cleanup_branch
        with:
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          pr-number: ${{ github.event.pull_request.number }}

