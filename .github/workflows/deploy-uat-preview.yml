name: Deploy UAT preview

on:
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

env:
  JAVA_VERSION: &JAVA_VERSION '25'
  JDK_DISTRIBUTION: &JDK_DISTRIBUTION 'corretto'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  compute-snapshot-version:
    runs-on: ubuntu-latest
    outputs:
      snapshot_version: ${{ steps.version.outputs.snapshot_version }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          fetch-tags: true
      - name: Compute version
        id: compute
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/compute-version@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
      - name: Compute snapshot version
        id: version
        shell: bash
        env:
          BUMP_TYPE: ${{ steps.compute.outputs.bump_type }}
          MAJOR:     ${{ steps.compute.outputs.major }}
          MINOR:     ${{ steps.compute.outputs.minor }}
          PATCH:     ${{ steps.compute.outputs.patch }}
        run: |
          set -eu
          BUMP="${BUMP_TYPE:-none}"
          M="${MAJOR:-0}"; N="${MINOR:-0}"; P="${PATCH:-0}"
          if [[ "$BUMP" == "none" ]]; then P=$((P+1)); fi
          HASH=$(git rev-parse --short HEAD)
          VERSION="${M}.${N}.${P}-${HASH}-SNAPSHOT"
          echo "snapshot_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Snapshot version: ${VERSION}"

  build-and-test:
    needs: [ compute-snapshot-version ]
    if: startsWith(github.head_ref || github.ref_name, 'openapi/') == false
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/gradle-build-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
    with:
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      integration_test_task: 'integrationTest'
      release_type: 'snapshot'
      override_version: ${{ needs.compute-snapshot-version.outputs.snapshot_version }}
      semgrep_check: 'true'
      jacoco_coverage_report: 'true'
      jacoco_coverage_report_path: 'claims-data/service/build/reports/jacoco'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}

  pact-test:
    needs: [ build-and-test ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-and-publish.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: write
      packages: write
      pull-requests: write
    with:
      pact_test_task: ":claims-data:service:pactTest"
      pacticipant_name: 'laa-data-claims-api'
      is_provider: true
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

  vulnerability-scan-app:
    runs-on: ubuntu-latest
    needs: [ build-and-test ]
    permissions:
      contents: read
    env:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      SNYK_TEST_EXCLUDE: build,generated
      SNYK_TARGET_REFERENCE: main
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Run Snyk to check app for vulnerabilities
        uses: snyk/actions/gradle@9adf32b1121593767fc3c057af55b55db032dc04 # master
        with:
          command: code test
          args: --severity-threshold=high

  helm-template-check:
    runs-on: ubuntu-latest
    needs: [ build-and-test ]
    strategy:
      fail-fast: false
      matrix:
        environment:
          - uat
          - staging
          - production
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5.0.1

      - name: Render chart for ${{ matrix.environment }}
        run: |
          helm template laa-data-claims-api .helm/data-claims-api \
            --namespace test \
            --values .helm/data-claims-api/values/${{ matrix.environment }}.yaml \
            --set replicationSummary.schedule="0 1 * * *" \
            --set image.repository="example/repo" \
            --set image.tag="test-tag" \
            --set ingress.annotations."nginx\.ingress\.kubernetes\.io/whitelist-source-range"="127.0.0.1/32" \
            --set spring.profile="main" \
            --set aws.region="eu-west-2" \
            --set namespace="test"

  ecr-publish-image:
    needs: [ build-and-test, compute-snapshot-version ]
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/ecr-publish-image.yml@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
    permissions:
      contents: read
      id-token: write
      security-events: write
    with:
      jar_subproject: 'claims-data:service'
      image_version: ${{ format('{0}-{1}', vars.LAA_DATA_CLAIMS_API_IMAGE_PREFIX, needs.compute-snapshot-version.outputs.snapshot_version) }}
      java_version: *JAVA_VERSION
      java_distribution: *JDK_DISTRIBUTION
      image_scan: 'true'
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      ecr_repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
      ecr_region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
      ecr_role_to_assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
      snyk_token: ${{ secrets.SNYK_TOKEN }}

  deploy-uat-preview:
    needs:
      - ecr-publish-image
      - pact-test
      - vulnerability-scan-app
    runs-on: ubuntu-latest
    environment: uat
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Extract release name
        id: extract_release_name_uat
        uses: ./.github/actions/get_release_name
        with:
          pr-number: ${{ github.event.pull_request.number }}

      - name: Can I deploy UAT?
        id: can_i_deploy_uat
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-can-i-deploy@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: ${{ steps.extract_release_name_uat.outputs.release-name }}
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}

      - name: Deploy UAT branch preview
        id: deploy_uat_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
          pr-number: ${{ github.event.pull_request.number }}
          image-tag: ${{ needs.ecr-publish-image.outputs.published_image_version }}

      - name: Record UAT deployment to pact broker
        id: record_uat_deployment
        uses: ministryofjustice/laa-ccms-common-workflows/.github/actions/pact-record-deployment@4daa796eff475c7a107e17daf4e4882b8a1b949b # v2.3.0
        with:
          pacticipant: 'laa-data-claims-api'
          environment: ${{ steps.extract_release_name_uat.outputs.release-name }}
          pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
          pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
          pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}
