name: Pact triggered workflow
run-name: Pact tests triggered by `${{ github.event.inputs.consumer }}`/`${{ github.event.inputs.consumerBranch }}`

on:
  workflow_dispatch:
    inputs:
      consumer:       { required: true, description: "Consumer name (e.g., laa-microservice)" }
      consumerBranch: { required: true, description: "Consumer branch (e.g., main)" }

jobs:
  pact-test:
    uses: ministryofjustice/laa-ccms-common-workflows/.github/workflows/pact-provider-webhook.yml@90aa22bf1f55a39b4f10c4f7168356f0669eed77 # v1
    permissions:
      contents: write
      packages: write
    with:
      pact_test_task: ":claims-data:service:pactTest"
      provider_name: 'laa-data-claims-api'
      consumer_name: ${{ github.event.inputs.consumer }}
      consumer_branch: ${{ github.event.inputs.consumerBranch }}
      java_version: 25
    secrets:
      gh_token: ${{ secrets.GITHUB_TOKEN }}
      pact_broker_url: ${{ secrets.PACT_BROKER_URL }}
      pact_broker_username: ${{ secrets.PACT_BROKER_USERNAME }}
      pact_broker_password: ${{ secrets.PACT_BROKER_PASSWORD }}
