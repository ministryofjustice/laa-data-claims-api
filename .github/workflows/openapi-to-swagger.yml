name: Preview OpenAPI Spec

on:
  push:
    branches:
      - 'openapi/**'

permissions:
  contents: read

jobs:
  semgrep-scan:
    name: semgrep-security-scan
    runs-on: ubuntu-latest
    container:
      image: returntocorp/semgrep
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: Run Semgrep scan
        run: semgrep scan --exclude-rule python.django.security.django-no-csrf-token.django-no-csrf-token --error --config auto

  generate-swagger-ui:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Set up JDK 21
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
        with:
          java-version: 21
          distribution: 'corretto'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@205054a7257716ec64af10a2e2ff1ac5d3b132db # v6

      - name: Generate Swagger UI
        run: ./gradlew -PswaggerOnly=true openApiGenerateSwaggerOnly

      - name: Copy Swagger UI to static folder
        run: |
          mkdir -p claims-data/swagger-ui-app/src/main/resources/static
          cp -r claims-data/api/build/generated/swagger-ui/* claims-data/swagger-ui-app/src/main/resources/static/

      - name: Build Swagger UI JAR
        run: ./gradlew  -PswaggerOnly=true :claims-data:swagger-ui-app:bootJar

      - name: Upload Swagger UI JAR
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7
        with:
          name: swagger-ui-jar
          path: claims-data/swagger-ui-app/build/libs/*.jar
          retention-days: 1

  build-push-docker:
    name: build and push docker image
    runs-on: ubuntu-latest
    needs:
      - generate-swagger-ui
    permissions:
      id-token: write
      contents: read
    steps:

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Download JAR artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          name: swagger-ui-jar
          path: claims-data/swagger-ui-app/build/libs/

        # ---------- AWS auth (OIDC) ----------
      - name: Configure AWS creds
        uses: aws-actions/configure-aws-credentials@8df5847569e6427dd6c4fb1cf565c83acfa8afa7 # v6
        with:
          role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          aws-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@183a1442edf41672e66566b7fc560e297a290896 # v2
        id: login-ecr
      - name: Build and push a Docker image for claims-data
        run: |
          docker build --no-cache -t $REGISTRY/$REPOSITORY:$IMAGE_TAG ./claims-data/swagger-ui-app
          docker push $REGISTRY/$REPOSITORY:$IMAGE_TAG
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          REPOSITORY: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          IMAGE_TAG: ${{ github.sha }}

  deploy-uat:
    runs-on: ubuntu-latest
    needs:
      - build-push-docker
    environment: uat
    permissions:
      id-token: write
      contents: read

    steps:

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Deploy UAT branch
        id: deploy_uat_branch
        uses: ./.github/actions/deploy_branch
        with:
          ecr-region: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REGION }}
          ecr-role-to-assume: ${{ secrets.LAA_DATA_CLAIMS_API_ECR_ROLE_TO_ASSUME }}
          ecr-repository: ${{ vars.LAA_DATA_CLAIMS_API_ECR_REPOSITORY }}
          kube-cert: ${{ secrets.KUBE_CERT }}
          kube-token: ${{ secrets.KUBE_TOKEN }}
          kube-cluster: ${{ secrets.KUBE_CLUSTER }}
          kube-namespace: ${{ secrets.KUBE_NAMESPACE }}
          app-environment: uat
